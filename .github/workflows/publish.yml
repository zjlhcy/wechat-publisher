name: Daily WeChat Article Publisher

on:
  schedule:
    - cron: '0 23 * * *'  # 7:00 AM Beijing time (UTC+8)
  workflow_dispatch:  # Allow manual trigger

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Create output directories
        run: |
          mkdir -p output/articles
          mkdir -p output/images
          mkdir -p logs

      - name: Generate placeholder images (if needed)
        run: |
          python -c "
          from PIL import Image
          import os
          img_dir = 'output/images'
          os.makedirs(img_dir, exist_ok=True)
          # Create a placeholder cover image
          img = Image.new('RGB', (900, 500), color=(66, 133, 244))
          img.save(os.path.join(img_dir, 'cover_placeholder.png'))
          # Create placeholder content images
          for i in range(1, 4):
              img2 = Image.new('RGB', (800, 450), color=(52, 168, 83))
              img2.save(os.path.join(img_dir, f'content_{i}.png'))
          print('Placeholder images created')
          "

      - name: Run publisher
        env:
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_APPSECRET: ${{ secrets.WECHAT_APPSECRET }}
        run: python publisher.py --all
