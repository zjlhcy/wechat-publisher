name: Daily Publish to WeChat Drafts

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Generate articles
        run: python generate_articles_v2.py

      - name: Generate placeholder images
        run: python gen_placeholder_images.py

      - name: Publish articles to WeChat drafts
        env:
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_APPSECRET: ${{ secrets.WECHAT_APPSECRET }}
        run: python publisher.py --all
