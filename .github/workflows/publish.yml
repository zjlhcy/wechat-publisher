name: Daily WeChat Article Publisher

on:
  schedule:
    - cron: '0 23 * * *'  # 7:00 AM Beijing time (UTC+8)
  workflow_dispatch:  # Allow manual trigger

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Generate articles and placeholder images
        run: |
          mkdir -p output/articles output/images logs
          python generate_articles_v2.py
          # Generate placeholder images for testing
          python -c "
          from PIL import Image, ImageDraw
          import os
          img_dir = 'output/images'
          colors = [(66,133,244), (52,168,83), (251,188,4), (234,67,53), (142,68,173), (26,188,156)]
          for i, color in enumerate(colors, 1):
              img = Image.new('RGB', (900, 500), color=color)
              draw = ImageDraw.Draw(img)
              draw.text((50, 220), f'Image {i}', fill='white')
              img.save(os.path.join(img_dir, f'placeholder_{i}.png'))
          print('Placeholder images created')
          "

      - name: Publish articles to WeChat drafts
        env:
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_APPSECRET: ${{ secrets.WECHAT_APPSECRET }}
        run: python publisher.py --all
