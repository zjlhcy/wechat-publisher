name: Daily Publish to WeChat Drafts

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Generate articles
        run: python generate_articles_v2.py

      - name: Generate placeholder images
        run: |
          mkdir -p output/images
          python -c "
import os
from PIL import Image
for i in range(1, 7):
    img = Image.new('RGB', (900, 500), color=(40+i*30, 80+i*20, 160+i*15))
    path = 'output/images/placeholder_' + str(i) + '.png'
    img.save(path)
    print('Created: ' + path)
          "

      - name: Publish articles to WeChat drafts
        env:
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_APPSECRET: ${{ secrets.WECHAT_APPSECRET }}
        run: python publisher.py --all
